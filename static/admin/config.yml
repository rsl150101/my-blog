backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    path: "{{category}}/{{year}}-{{month}}-{{day}}-{{custom_slug}}"
    slug: "{{custom_slug}}"

    extension: "mdx"
    format: "frontmatter"

    media_folder: ""
    public_folder: ""

    fields:
      - { label: "Title", name: "title", widget: "string", required: true }
      - {
          label: "URL Slug",
          name: "custom_slug",
          widget: "string",
          hint: "URL 주소로 사용될 값입니다. 영어 소문자, 숫자, 하이픈(-)만 입력해주세요.",
          required: true,
          pattern: ["^[a-z0-9-]+$", "URL에는 소문자, 숫자, 하이픈(-)만 사용할 수 있습니다."],
        }
      - {
          label: "Category",
          name: "category",
          widget: "string",
          default: "dev",
          hint: "폴더명으로 사용되므로 소문자, 숫자, 하이픈(-)만 입력해주세요. (예: react-hooks)",
          required: true,
          pattern:
            [
              "^[a-z0-9-]+$",
              "대문자나 띄어쓰기는 사용할 수 없습니다. 소문자와 하이픈(-)을 사용해주세요.",
            ],
        }
      - {
          label: "Description",
          name: "description",
          widget: "string",
          hint: "게시글 카드에 요약된 설명으로 사용될 값입니다.",
          pattern:
            [
              '^[ a-zA-Z가-힣0-9!@#$%^&*()_+\-=\[\]{};'':"\\|,.<>\/?~]+$',
              "설명에는 한글, 영어, 숫자, 특수 기호만 사용할 수 있습니다.",
            ],
        }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false }
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          modes: ["raw", "rich_text"],
          default_mode: "raw",
        }
